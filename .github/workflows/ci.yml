name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Linux CGO build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Tests (race) + coverage gate
        run: |
          go test -race ./...
          bash scripts/coverage-gate.sh

      # Windows: gui_windows.go uses only stdlib (no CGO), so CGO_ENABLED=0 works.
      # Linux: tested natively above. macOS: separate job below (needs CGO + Cocoa).
      - name: Cross-compile check (windows)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o /dev/null .

  # macOS build check: WKWebView (webview package) requires CGO; must run on macOS.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build darwin/arm64
        run: MACOSX_DEPLOYMENT_TARGET=11.0 GOARCH=arm64 go build -o /dev/null .
      - name: Build darwin/amd64
        run: MACOSX_DEPLOYMENT_TARGET=11.0 CGO_ENABLED=1 CC="cc -arch x86_64" GOARCH=amd64 go build -o /dev/null .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install Linux CGO build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  commit-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Denylist guard
        env:
          TALLYWELL_DENYLIST: ${{ secrets.TALLYWELL_DENYLIST }}
        run: |
          if [ -z "$TALLYWELL_DENYLIST" ]; then
            echo "No denylist configured; skipping."; exit 0
          fi
          bash scripts/check-denylist.sh --all

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux CGO build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev
      - name: Build binary
        run: go build -o tallywell .
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run E2E smoke
        working-directory: e2e
        env:
          TALLYWELL_BIN: ${{ github.workspace }}/tallywell
        run: npx playwright test
