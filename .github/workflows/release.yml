name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # macOS binaries must be built on macOS: fyne.io/systray uses CGO (Cocoa)
  # on Darwin and cannot be cross-compiled from Linux.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build macOS binaries and DMG
        run: bash scripts/build-mac-app.sh

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: dist/

  # Windows and Linux binaries are built on ubuntu. Windows systray uses pure
  # Win32 syscalls (CGO_ENABLED=0 fine). Linux systray uses appindicator (CGO).
  build-other:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Linux systray build dependency
        run: sudo apt-get update -q && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Build Windows and Linux binaries
        run: |
          mkdir -p dist
          echo "building windows/amd64"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/tallywell-windows-amd64.exe .
          echo "building linux/amd64"
          GOOS=linux GOARCH=amd64 go build -o dist/tallywell-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-other
          path: dist/

  screenshots:
    needs: build-other
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-other
          path: dist/

      - name: Install Linux systray runtime dependency
        run: sudo apt-get update -q && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Make binary executable
        run: chmod +x dist/tallywell-linux-amd64

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: e2e
        run: npm install && npx playwright install --with-deps chromium

      - name: Capture screenshots
        working-directory: e2e
        env:
          TALLYWELL_BIN: ${{ github.workspace }}/dist/tallywell-linux-amd64
          TALLYWELL_NO_TRAY: '1'
          SCREENSHOTS_DIR: ${{ github.workspace }}/site-screenshots
        run: npx playwright test tests/screenshots.spec.ts

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: site-screenshots/

  publish:
    needs: [build-mac, build-other, screenshots]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-other
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: site-screenshots/

      - name: Checksums + Pages assembly
        run: |
          ( cd dist && sha256sum tallywell-* Tallywell-*.dmg > SHA256SUMS )
          mkdir -p _site/downloads _site/screenshots
          cp -r site/* _site/ 2>/dev/null || true
          cp dist/tallywell-* dist/Tallywell-*.dmg dist/SHA256SUMS _site/downloads/
          # Stable URL for the site's download button — always points to latest.
          cp dist/Tallywell-*.dmg _site/downloads/Tallywell.dmg
          cp site-screenshots/*.png _site/screenshots/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tallywell-*
            dist/Tallywell-*.dmg
            dist/SHA256SUMS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
