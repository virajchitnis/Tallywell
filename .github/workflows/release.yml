name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Cross-compile all targets
        run: |
          mkdir -p dist
          for t in darwin/arm64 darwin/amd64 windows/amd64 linux/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            out="dist/tallywell-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $os/$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o "$out" .
          done
          ( cd dist && sha256sum tallywell-* > SHA256SUMS )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tallywell-*
            dist/SHA256SUMS

      - name: Assemble Pages site
        run: |
          mkdir -p _site/downloads
          cp -r site/* _site/ 2>/dev/null || true
          cp dist/tallywell-* dist/SHA256SUMS _site/downloads/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
