name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # macOS binaries must be built on macOS: fyne.io/systray uses CGO (Cocoa)
  # on Darwin and cannot be cross-compiled from Linux.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build macOS binaries and DMG
        run: bash scripts/build-mac-app.sh

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: dist/

  # Windows and Linux binaries are built on ubuntu. Windows systray uses pure
  # Win32 syscalls (CGO_ENABLED=0 fine). Linux systray uses appindicator (CGO).
  build-other:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          # Ubuntu 24.04 ships webkit2gtk-4.1; webview_go's CGO directive asks
          # for webkit2gtk-4.0 via pkg-config. Create a compat .pc shim.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            nsis imagemagick icoutils
          mkdir -p /tmp/pc-compat
          printf 'Name: webkit2gtk-4.0\nDescription: compat shim\nRequires: webkit2gtk-4.1\nVersion: 2.43.0\n' \
            > /tmp/pc-compat/webkit2gtk-4.0.pc
          echo "PKG_CONFIG_PATH=/tmp/pc-compat${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Build Windows and Linux binaries
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${GITHUB_REF_NAME}"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/tallywell-windows-amd64.exe .
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/tallywell-linux-amd64 .

      - name: Generate app icon
        run: go run scripts/gen-icon.go

      - name: Build Windows installer (NSIS)
        run: |
          # ImageMagick's ICO coder is blocked by Ubuntu's security policy;
          # use icoutils (icotool) instead to build a proper multi-size .ico.
          for sz in 16 32 48 64 128 256; do
            convert dist/tallywell-icon-1024.png -resize ${sz}x${sz} /tmp/icon-${sz}.png
          done
          icotool -c -o dist/tallywell.ico \
            /tmp/icon-16.png /tmp/icon-32.png /tmp/icon-48.png \
            /tmp/icon-64.png /tmp/icon-128.png /tmp/icon-256.png
          VERSION="${GITHUB_REF_NAME#v}"
          DIST_DIR="$(pwd)/dist"
          makensis -DAPP_VERSION="$VERSION" "-DDIST_DIR=$DIST_DIR" scripts/tallywell.nsi

      - name: Build Linux AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p Tallywell.AppDir/usr/bin
          cp dist/tallywell-linux-amd64 Tallywell.AppDir/usr/bin/tallywell
          chmod +x Tallywell.AppDir/usr/bin/tallywell

          convert dist/tallywell-icon-1024.png -resize 256x256 Tallywell.AppDir/tallywell.png
          ln -sf tallywell.png Tallywell.AppDir/.DirIcon
          cp scripts/tallywell.desktop Tallywell.AppDir/tallywell.desktop

          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "${HERE}/usr/bin/tallywell" "$@"\n' \
            > Tallywell.AppDir/AppRun
          chmod +x Tallywell.AppDir/AppRun

          wget -qO appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            Tallywell.AppDir "dist/Tallywell-${VERSION}-x86_64.AppImage"
          chmod +x "dist/Tallywell-${VERSION}-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-other
          path: dist/

  screenshots:
    needs: build-other
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-other
          path: dist/

      - name: Install Linux WebKitGTK runtime
        run: sudo apt-get update -q && sudo apt-get install -y libwebkit2gtk-4.1-0

      - name: Make binary executable
        run: chmod +x dist/tallywell-linux-amd64

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: e2e
        run: npm install && npx playwright install --with-deps chromium

      - name: Capture screenshots
        working-directory: e2e
        env:
          TALLYWELL_BIN: ${{ github.workspace }}/dist/tallywell-linux-amd64
          TALLYWELL_NO_TRAY: '1'
          SCREENSHOTS_DIR: ${{ github.workspace }}/site-screenshots
        run: npx playwright test tests/screenshots.spec.ts

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: site-screenshots/

  publish:
    needs: [build-mac, build-other, screenshots]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-other
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: site-screenshots/

      - name: Checksums + Pages assembly
        run: |
          ( cd dist && sha256sum \
              tallywell-windows-amd64.exe \
              tallywell-linux-amd64 \
              Tallywell-*.dmg \
              Tallywell-*-Setup.exe \
              Tallywell-*-x86_64.AppImage > SHA256SUMS )
          mkdir -p _site/downloads _site/screenshots
          cp -r site/* _site/ 2>/dev/null || true
          cp dist/tallywell-windows-amd64.exe dist/tallywell-linux-amd64 _site/downloads/
          cp dist/Tallywell-*.dmg dist/Tallywell-*-Setup.exe dist/Tallywell-*-x86_64.AppImage \
            dist/SHA256SUMS _site/downloads/
          # Stable URLs for download buttons
          cp dist/Tallywell-*.dmg               _site/downloads/Tallywell.dmg
          cp dist/Tallywell-*-Setup.exe         _site/downloads/Tallywell-Setup.exe
          cp dist/Tallywell-*-x86_64.AppImage   _site/downloads/Tallywell.AppImage
          cp site-screenshots/*.png _site/screenshots/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tallywell-windows-amd64.exe
            dist/tallywell-linux-amd64
            dist/Tallywell-*.dmg
            dist/Tallywell-*-Setup.exe
            dist/Tallywell-*-x86_64.AppImage
            dist/SHA256SUMS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
